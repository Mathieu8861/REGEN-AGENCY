<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Clients - REGEN AGENCY</title>
    <link rel="icon" href="../../favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/espace-client.css">
</head>
<body>
    <div class="rc-app">
        <!-- Sidebar -->
        <aside class="rc-sidebar">
            <div class="rc-sidebar__header">
                <a href="../dashboard.html" class="rc-sidebar__logo">
                    <img src="../../assets/images/logo-regen.png" alt="REGEN" onerror="this.style.display='none'">
                    <div>
                        <span class="rc-sidebar__logo-text">REGEN</span>
                        <span class="rc-sidebar__logo-sub">Espace Client</span>
                    </div>
                </a>
            </div>
            <div class="rc-sidebar__client">
                <span class="rc-sidebar__client-label">Client</span>
                <div id="regen-client-selector"></div>
            </div>
            <nav class="rc-sidebar__nav">
                <div class="rc-sidebar__section">
                    <div class="rc-sidebar__section-title">Analytics</div>
                    <a href="../dashboard.html" class="rc-sidebar__link"><span class="rc-sidebar__link-icon">&#9776;</span>Dashboard</a>
                    <a href="../campaigns.html" class="rc-sidebar__link"><span class="rc-sidebar__link-icon">&#9733;</span>Campagnes</a>
                    <a href="../orders.html" class="rc-sidebar__link"><span class="rc-sidebar__link-icon">&#128722;</span>Commandes</a>
                </div>
                <div class="rc-sidebar__section">
                    <div class="rc-sidebar__section-title">Ressources</div>
                    <a href="../reports.html" class="rc-sidebar__link"><span class="rc-sidebar__link-icon">&#128196;</span>Rapports</a>
                    <a href="../integrations.html" class="rc-sidebar__link" data-admin-only><span class="rc-sidebar__link-icon">&#128268;</span>Integrations</a>
                </div>
                <div class="rc-sidebar__section" data-admin-only>
                    <div class="rc-sidebar__section-title">Administration</div>
                    <a href="clients.html" class="rc-sidebar__link active"><span class="rc-sidebar__link-icon">&#128101;</span>Clients</a>
                    <a href="import.html" class="rc-sidebar__link"><span class="rc-sidebar__link-icon">&#128228;</span>Import CSV</a>
                </div>
            </nav>
            <div class="rc-sidebar__footer">
                <div class="rc-sidebar__user">
                    <div class="rc-sidebar__avatar" id="regen-user-avatar">?</div>
                    <div class="rc-sidebar__user-info">
                        <div class="rc-sidebar__user-name" id="regen-user-name">Chargement...</div>
                        <span id="regen-user-role" class="rc-badge">...</span>
                    </div>
                </div>
                <button class="rc-sidebar__logout" id="regen-logout-btn">&#x2190; Deconnexion</button>
            </div>
        </aside>

        <!-- Main -->
        <main class="rc-main">
            <header class="rc-header">
                <div class="rc-header__left">
                    <button class="rc-header__toggle" id="regen-sidebar-toggle">&#9776;</button>
                    <h1 class="rc-header__title">Gestion des Clients</h1>
                </div>
                <div class="rc-header__right">
                    <button class="rc-btn rc-btn--primary rc-btn--sm" id="add-client-btn">+ Nouveau client</button>
                </div>
            </header>

            <div class="rc-content">
                <!-- Client list -->
                <div class="rc-table-wrap">
                    <table class="rc-table" id="clients-table">
                        <thead>
                            <tr>
                                <th>Client</th>
                                <th>Site web</th>
                                <th>Plateforme</th>
                                <th>Statut</th>
                                <th class="rc-text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="clients-table-body">
                            <tr><td colspan="5"><div class="rc-loading"><div class="rc-spinner"></div><span>Chargement...</span></div></td></tr>
                        </tbody>
                    </table>
                </div>

                <!-- Add/Edit Client Modal (inline) -->
                <div class="rc-card" id="client-form-card" style="display:none;">
                    <h2 class="rc-card__title" id="client-form-title">Nouveau client</h2>
                    <form id="client-form">
                        <input type="hidden" id="client-id">
                        <div class="rc-grid-2">
                            <div class="rc-form-group">
                                <label class="rc-form-label">Nom du client</label>
                                <input class="rc-input" type="text" id="client-name" placeholder="Ex: OXO" required>
                            </div>
                            <div class="rc-form-group">
                                <label class="rc-form-label">Site web</label>
                                <input class="rc-input" type="url" id="client-website" placeholder="https://www.example.com">
                            </div>
                        </div>
                        <div class="rc-grid-2">
                            <div class="rc-form-group">
                                <label class="rc-form-label">Plateforme e-commerce</label>
                                <select class="rc-select" id="client-platform">
                                    <option value="prestashop">PrestaShop</option>
                                    <option value="shopify">Shopify</option>
                                    <option value="woocommerce">WooCommerce</option>
                                    <option value="other">Autre</option>
                                </select>
                            </div>
                            <div class="rc-form-group">
                                <label class="rc-form-label">Couleur</label>
                                <input class="rc-input" type="color" id="client-color" value="#2FB963">
                            </div>
                        </div>
                        <div class="rc-form-group">
                            <label class="rc-form-label">Notes</label>
                            <textarea class="rc-input" id="client-notes" rows="3" placeholder="Notes internes..."></textarea>
                        </div>
                        <div class="rc-flex rc-gap-8">
                            <button type="submit" class="rc-btn rc-btn--primary">Enregistrer</button>
                            <button type="button" class="rc-btn rc-btn--secondary" id="client-form-cancel">Annuler</button>
                        </div>
                    </form>
                </div>

                <!-- Users management -->
                <div class="rc-card" style="margin-top: 24px;">
                    <h2 class="rc-card__title">Utilisateurs de l'agence</h2>
                    <div id="users-list">
                        <div class="rc-loading"><div class="rc-spinner"></div><span>Chargement...</span></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/regen-app.js"></script>
    <script src="../../js/regen-admin.js"></script>
</body>
</html>
