<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Réseaux sociaux - Regen Agency</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #2FB963;
            --primary: #173C3A;
            --gray: #6b7280;
            --radius: 14px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Quicksand', sans-serif; background: #f0f3f1; min-height: 100vh; color: var(--primary); padding: 0; }
        .container { padding: 28px 32px; }
        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 20px; margin-bottom: 24px;
            border-bottom: 2px solid #e5e7eb;
        }
        .page-title { font-size: 1.4rem; color: #1a2332; font-weight: 700; }
        .page-title span { color: var(--green); }
        .placeholder {
            background: white; border-radius: var(--radius);
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            padding: 56px 24px; text-align: center; color: var(--gray);
        }
        .placeholder svg { width: 64px; height: 64px; margin: 0 auto 16px; color: #d1d5db; }
        .placeholder h2 { color: #1a2332; font-size: 1.2rem; margin-bottom: 8px; }
        .placeholder p { font-size: 0.92rem; line-height: 1.5; max-width: 480px; margin: 0 auto 12px; }
        .placeholder-tag {
            display: inline-block; margin-top: 12px;
            background: #fef3c7; color: #b45309;
            padding: 5px 14px; border-radius: 50px;
            font-size: 0.78rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1 class="page-title">Réseaux sociaux<span>.</span></h1>
    </div>
    <div class="placeholder">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        <h2>Gestion des réseaux sociaux</h2>
        <p>Cet espace est en cours de conception. Mathieu va définir les fonctionnalités à venir.</p>
        <div class="placeholder-tag">À venir</div>
    </div>
</div>

<script src="admin-shell.js"></script>
</body>
</html>
