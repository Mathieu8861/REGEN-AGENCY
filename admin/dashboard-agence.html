<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Dashboard Agence - Regen Agency</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #2FB963;
            --green-light: #e8f9ef;
            --dark: #1a2332;
            --gray: #6b7280;
            --gray-light: #edf2ee;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --card-bg: #f8faf9;
            --card-bg-gradient: linear-gradient(160deg, #f8faf9 0%, #f1f5f3 100%);
            --card-border: #e4ebe7;
            --input-bg: #fafcfb;
            --input-border: #d8e2dc;
            --hover-bg: #f0f5f2;
            --table-border: #e8efe9;
            --table-header-border: #d8e2dc;
            --stat-gradient: linear-gradient(135deg, #f4f9f6 0%, #eaf3ed 100%);
            --card-header-gradient: linear-gradient(90deg, rgba(47,185,99,0.08) 0%, rgba(5,192,138,0.03) 50%, transparent 100%);
        }
        [data-theme="dark"] {
            --green: #34d26b;
            --green-light: #0d2618;
            --dark: #e8f0ec;
            --gray: #8a9b92;
            --gray-light: #0d1f17;
            --shadow: 0 2px 16px rgba(0,0,0,0.3);
            --card-bg: #142a1f;
            --card-bg-gradient: linear-gradient(160deg, #162e22 0%, #112018 100%);
            --card-border: #1e3a2b;
            --input-bg: #1a3628;
            --input-border: #2d5040;
            --hover-bg: #1a3628;
            --table-border: #1e3a2b;
            --table-header-border: #2d5040;
            --stat-gradient: linear-gradient(135deg, #153026 0%, #0f2119 100%);
            --card-header-gradient: linear-gradient(90deg, rgba(47,185,99,0.12) 0%, rgba(5,192,138,0.06) 50%, transparent 100%);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--gray-light);
            min-height: 100vh; padding: 30px 20px;
            color: var(--dark);
            transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 1200px; margin: 0 auto; }

        /* Header */
        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding-bottom: 20px;
            border-bottom: 2px solid var(--card-border);
        }
        .page-header-left { display: flex; align-items: center; gap: 15px; }
        .page-logo img { width: 40px; height: 40px; object-fit: contain; }
        .page-title { font-size: 1.4rem; color: var(--dark); }
        .page-title span { color: var(--green); }
        .header-actions { display: flex; gap: 10px; align-items: center; }

        /* Buttons */
        .btn {
            padding: 8px 18px; border-radius: 12px; font-family: inherit;
            font-size: 0.8rem; font-weight: 700; cursor: pointer;
            transition: all 0.3s ease; text-decoration: none; display: inline-flex;
            align-items: center; gap: 6px; border: none;
            background: var(--card-bg); color: var(--dark);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
        .btn--back {
            background: linear-gradient(135deg, var(--card-bg) 0%, var(--hover-bg) 100%);
            color: var(--green); border: 1.5px solid var(--green);
        }
        .btn--back:hover { background: var(--green); color: white; }
        .btn--danger { background: transparent; color: #ef4444; border: 1.5px solid #fca5a5; box-shadow: none; }
        .btn--danger:hover { background: #ef4444; color: white; }
        .btn--sm { padding: 7px 16px; font-size: 0.75rem; }
        .btn--theme {
            background: var(--card-bg-gradient, var(--card-bg)); border: 1.5px solid var(--card-border);
            font-size: 1.1rem; padding: 7px 11px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .btn--theme:hover { border-color: var(--green); }
        .btn--arrow {
            width: 28px; height: 28px; padding: 0; font-size: 0.8rem; line-height: 1;
            display: inline-flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--green) 0%, #05C08A 100%);
            color: white; border: none; border-radius: 8px;
            box-shadow: 0 2px 8px rgba(47,185,99,0.25);
        }
        .btn--arrow:hover { box-shadow: 0 4px 14px rgba(47,185,99,0.4); }

        /* Stats */
        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 0; margin-bottom: 24px; background: var(--card-bg-gradient, var(--card-bg));
            border-radius: var(--radius); box-shadow: var(--shadow);
            overflow: hidden; border: 1px solid var(--card-border);
        }
        .stat-card {
            padding: 24px 20px; text-align: center;
            border-right: 1px solid var(--card-border); border-bottom: 1px solid var(--card-border);
            position: relative; background: var(--stat-gradient, var(--card-bg));
            transition: background 0.3s;
        }
        .stat-card:nth-child(3n) { border-right: none; }
        .stat-card:nth-last-child(-n+3) { border-bottom: none; }
        .stat-card__value { font-size: 1.6rem; font-weight: 800; color: var(--dark); margin-bottom: 2px; line-height: 1.2; }
        .stat-card__label { font-size: 0.7rem; color: var(--gray); font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
        .stat-card--green .stat-card__value { color: var(--green); }
        .stat-card--blue .stat-card__value { color: #3b82f6; }
        .stat-card--orange .stat-card__value { color: #f59e0b; }
        .stat-card--purple .stat-card__value { color: #8b5cf6; }
        .stat-card--teal .stat-card__value { color: #0d9488; }
        .stat-card--rose .stat-card__value { color: #e11d48; }

        /* Cards */
        .card {
            background: var(--card-bg-gradient, var(--card-bg)); border-radius: var(--radius); padding: 24px;
            box-shadow: var(--shadow); margin-bottom: 24px; border: 1px solid var(--card-border);
        }
        .card__title {
            font-size: 1rem; font-weight: 700; color: var(--dark);
            margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; margin: -24px -24px 16px -24px;
            border-radius: var(--radius) var(--radius) 0 0;
            background: var(--card-header-gradient, transparent);
            border-bottom: 1px solid var(--card-border);
        }
        .card__title-icon img { width: 20px; height: 20px; object-fit: contain; vertical-align: middle; }

        /* Table */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; padding: 10px 12px; color: var(--gray); font-weight: 600; border-bottom: 2px solid var(--table-header-border); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.3px; }
        td { padding: 10px 12px; border-bottom: 1px solid var(--table-border); color: var(--dark); }
        tr:hover td { background: var(--hover-bg); }
        .text-right { text-align: right; }
        .text-bold { font-weight: 700; }
        .text-muted { color: var(--gray); }
        .text-sm { font-size: 0.8rem; }

        /* ROAS badge */
        .roas-badge {
            display: inline-block; padding: 3px 10px; border-radius: 50px;
            font-weight: 800; font-size: 0.78rem;
        }
        .roas--good { background: #d1fae5; color: #059669; }
        .roas--ok { background: #fef3c7; color: #d97706; }
        .roas--bad { background: #fee2e2; color: #dc2626; }

        /* Client name link */
        .client-link {
            color: var(--green); font-weight: 700; text-decoration: none;
            transition: opacity 0.2s;
        }
        .client-link:hover { opacity: 0.7; }

        /* Evolution chart */
        .evo-chart { display: flex; flex-direction: column; gap: 24px; }
        .evo-chart__row { display: flex; flex-direction: column; gap: 8px; }
        .evo-chart__label { font-size: 0.75rem; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; }
        .evo-chart__bars { display: flex; align-items: flex-end; gap: 4px; height: 140px; padding: 0 4px; }
        .evo-bar { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 4px; position: relative; min-width: 0; }
        .evo-bar__fill { width: 100%; border-radius: 6px 6px 2px 2px; min-height: 2px; transition: height 0.5s ease; }
        .evo-bar__fill--ca { background: linear-gradient(180deg, var(--green), #05C08A); }
        .evo-bar__fill--spend { background: linear-gradient(180deg, #f59e0b, #d97706); }
        .evo-bar__fill--roas { background: linear-gradient(180deg, #8b5cf6, #6d28d9); }
        .evo-bar__value { font-size: 0.6rem; font-weight: 700; color: var(--dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
        .evo-bar__month { font-size: 0.62rem; color: var(--gray); font-weight: 600; margin-top: 4px; }
        .evo-legend { display: flex; gap: 16px; margin-bottom: 8px; flex-wrap: wrap; }
        .evo-legend__item { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; font-weight: 600; color: var(--gray); }
        .evo-legend__dot { width: 10px; height: 10px; border-radius: 3px; }
        .evo-legend__dot--ca { background: linear-gradient(135deg, var(--green), #05C08A); }
        .evo-legend__dot--spend { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .evo-legend__dot--roas { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }

        /* Loading */
        .loading { display: flex; align-items: center; gap: 10px; color: var(--gray); font-size: 0.85rem; padding: 20px 0; }
        .spinner { width: 20px; height: 20px; border: 3px solid var(--card-border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }

        footer { text-align:center; padding:30px 0; color:var(--gray); font-size:0.8rem; }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .stat-card:nth-child(2n) { border-right: none; }
        }
    </style>
</head>
<body>
<div class="container">
    <header class="page-header">
        <div class="page-header-left">
            <div class="page-logo"><img src="../assets/images/logo-icon.png" alt="Regen"></div>
            <h1 class="page-title">Dashboard <span>Agence</span></h1>
        </div>
        <div class="header-actions">
            <button class="btn btn--sm btn--theme" id="theme-toggle" title="Mode nuit/jour">&#127769;</button>
            <a href="../connexion.html" class="btn btn--back">&#8592; Retour Hub</a>
            <button class="btn btn--danger btn--sm" id="logoutBtn">Deconnexion</button>
        </div>
    </header>

    <!-- Month Selector -->
    <div class="card" style="margin-bottom:20px; padding:14px 24px;">
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
            <span class="text-sm text-bold" style="color:var(--dark);">Mois :</span>
            <div style="display:flex; align-items:center; gap:6px;">
                <button class="btn btn--sm btn--arrow" id="month-prev">&#10094;</button>
                <span id="month-label" style="font-size:1rem; font-weight:800; color:var(--dark); min-width:140px; text-align:center;"></span>
                <button class="btn btn--sm btn--arrow" id="month-next">&#10095;</button>
            </div>
            <span class="text-sm text-muted" id="date-range-label" style="margin-left:auto;"></span>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid">
        <div class="stat-card stat-card--green">
            <div class="stat-card__label">CA Total</div>
            <div class="stat-card__value" id="stat-ca">-</div>
        </div>
        <div class="stat-card stat-card--orange">
            <div class="stat-card__label">Depenses Ads</div>
            <div class="stat-card__value" id="stat-spend">-</div>
        </div>
        <div class="stat-card stat-card--purple">
            <div class="stat-card__label">ROAS Moyen</div>
            <div class="stat-card__value" id="stat-roas">-</div>
        </div>
        <div class="stat-card stat-card--blue">
            <div class="stat-card__label">Clients Actifs</div>
            <div class="stat-card__value" id="stat-clients">-</div>
        </div>
        <div class="stat-card stat-card--teal">
            <div class="stat-card__label">Commandes</div>
            <div class="stat-card__value" id="stat-orders">-</div>
        </div>
        <div class="stat-card stat-card--rose">
            <div class="stat-card__label">Panier Moyen</div>
            <div class="stat-card__value" id="stat-aov">-</div>
        </div>
    </div>

    <!-- Performance par client -->
    <div class="card">
        <h3 class="card__title"><span class="card__title-icon"><img src="../assets/images/http.png" alt=""></span> Performance par client</h3>
        <div id="client-table">
            <div class="loading"><div class="spinner"></div><span>Chargement...</span></div>
        </div>
    </div>

    <!-- Evolution Agence -->
    <div class="card">
        <h3 class="card__title"><span class="card__title-icon"><img src="../assets/images/statistiques.png" alt=""></span> Evolution annuelle</h3>
        <div id="evolution-chart">
            <div class="loading"><div class="spinner"></div><span>Chargement...</span></div>
        </div>
    </div>

    <footer>Regen Agency &copy; 2025 - Dashboard Agence</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    'use strict';

    // Theme toggle
    (function initTheme() {
        var saved = localStorage.getItem('regen_theme');
        if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        var btn = document.getElementById('theme-toggle');
        if (btn) {
            btn.textContent = saved === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
            btn.addEventListener('click', function() {
                var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
                localStorage.setItem('regen_theme', isDark ? 'light' : 'dark');
                btn.textContent = isDark ? '\uD83C\uDF19' : '\u2600\uFE0F';
            });
        }
    })();

    // Config
    var SUPABASE_URL = 'https://jrhqqsybebdkoqrnogez.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpyaHFxc3liZWJka29xcm5vZ2V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDU2NzEsImV4cCI6MjA4ODEyMTY3MX0._BykT5zc-GH6SLwi_jaaukNmmmR_zpcdsuic3E5dFm8';
    var AGENCY_ID = '00000000-0000-0000-0000-000000000001';
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    var MONTH_NAMES = ['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre'];

    // Auth check
    if (sessionStorage.getItem('regen_admin_auth') !== 'true') {
        window.location.href = '../connexion.html'; return;
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', function() {
        sessionStorage.removeItem('regen_admin_auth');
        window.location.href = '../connexion.html';
    });

    // Month navigation
    var dateRange = { from: null, to: null };
    var currentMonth = new Date();

    function setMonth(d) {
        var year = d.getFullYear(), month = d.getMonth();
        var from = new Date(year, month, 1);
        var to = new Date(year, month + 1, 0);
        var now = new Date();
        if (year === now.getFullYear() && month === now.getMonth()) to = now;
        dateRange.from = fmt(from);
        dateRange.to = fmt(to);
        document.getElementById('month-label').textContent = MONTH_NAMES[month] + ' ' + year;
        document.getElementById('date-range-label').textContent = fmtD(dateRange.from) + ' \u2192 ' + fmtD(dateRange.to);
        var nextBtn = document.getElementById('month-next');
        if (year === now.getFullYear() && month === now.getMonth()) {
            nextBtn.style.opacity = '0.3'; nextBtn.style.pointerEvents = 'none';
        } else {
            nextBtn.style.opacity = '1'; nextBtn.style.pointerEvents = 'auto';
        }
    }

    setMonth(currentMonth);
    document.getElementById('month-prev').addEventListener('click', function() {
        currentMonth.setMonth(currentMonth.getMonth() - 1); setMonth(currentMonth); loadAll();
    });
    document.getElementById('month-next').addEventListener('click', function() {
        var now = new Date(), next = new Date(currentMonth);
        next.setMonth(next.getMonth() + 1);
        if (next.getFullYear() < now.getFullYear() || (next.getFullYear() === now.getFullYear() && next.getMonth() <= now.getMonth())) {
            currentMonth = next; setMonth(currentMonth); loadAll();
        }
    });

    // Helpers
    function fmt(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
    function fmtD(s) { var p = s.split('-'); return p[2] + '/' + p[1] + '/' + p[0]; }
    function fmtM(n) { return n.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' EUR'; }
    function fmtC(n) { if (n >= 1000) return (n/1000).toFixed(1).replace('.0','') + 'k'; return Math.round(n).toString(); }

    // Auth Supabase then load
    sb.auth.getSession().then(function(res) {
        if (!res.data.session) {
            // Try auto-login (check stored creds)
            document.getElementById('client-table').innerHTML = '<p class="text-muted text-sm">Connexion Supabase requise. Allez d\'abord sur <a href="clients.html" style="color:var(--green);">Vue globale Clients</a> pour vous connecter.</p>';
            return;
        }
        loadAll();
    });

    async function loadAll() {
        // 1. Get all active clients
        var cRes = await sb.from('clients').select('id, name, website').eq('agency_id', AGENCY_ID).eq('is_active', true).order('name');
        var clients = cRes.data || [];

        document.getElementById('stat-clients').textContent = clients.length;

        if (clients.length === 0) {
            document.getElementById('client-table').innerHTML = '<p class="text-muted text-sm">Aucun client actif.</p>';
            return;
        }

        // 2. Fetch all orders for the period (paginated)
        var allOrders = [];
        var offset = 0, hasMore = true;
        while (hasMore) {
            var oRes = await sb.from('orders').select('client_id, channel, total_ttc, order_date')
                .eq('agency_id', AGENCY_ID)
                .gte('order_date', dateRange.from)
                .lte('order_date', dateRange.to)
                .range(offset, offset + 999);
            var batch = oRes.data || [];
            // Fallback: if agency_id filter doesn't work, filter by client IDs
            if (batch.length === 0 && offset === 0) {
                var clientIds = clients.map(function(c) { return c.id; });
                hasMore = true; offset = 0;
                while (hasMore) {
                    var oRes2 = await sb.from('orders').select('client_id, channel, total_ttc, order_date')
                        .in('client_id', clientIds)
                        .gte('order_date', dateRange.from)
                        .lte('order_date', dateRange.to)
                        .range(offset, offset + 999);
                    var b2 = oRes2.data || [];
                    allOrders = allOrders.concat(b2);
                    hasMore = b2.length === 1000;
                    offset += 1000;
                }
                break;
            }
            allOrders = allOrders.concat(batch);
            hasMore = batch.length === 1000;
            offset += 1000;
        }

        // 3. Fetch spend per client (via ad_accounts -> ad_campaigns -> ad_daily_metrics)
        var spendByClient = {};
        for (var c = 0; c < clients.length; c++) {
            var cid = clients[c].id;
            spendByClient[cid] = 0;
            try {
                var aRes = await sb.from('ad_accounts').select('id').eq('client_id', cid);
                var accounts = aRes.data || [];
                if (accounts.length > 0) {
                    var accIds = accounts.map(function(a) { return a.id; });
                    var cpRes = await sb.from('ad_campaigns').select('id').in('ad_account_id', accIds);
                    var camps = cpRes.data || [];
                    if (camps.length > 0) {
                        var campIds = camps.map(function(cp) { return cp.id; });
                        var mRes = await sb.from('ad_daily_metrics').select('spend')
                            .in('campaign_id', campIds)
                            .gte('date', dateRange.from)
                            .lte('date', dateRange.to);
                        (mRes.data || []).forEach(function(m) {
                            spendByClient[cid] += parseFloat(m.spend || 0);
                        });
                    }
                }
            } catch(e) {}
        }

        // 4. Aggregate
        var paidChannels = ['google_ads', 'meta_ads', 'tiktok_ads'];
        var clientMap = {};
        clients.forEach(function(c) {
            clientMap[c.id] = { name: c.name, website: c.website, ca: 0, adsCA: 0, orders: 0, spend: spendByClient[c.id] || 0 };
        });

        allOrders.forEach(function(o) {
            var cm = clientMap[o.client_id];
            if (!cm) return;
            cm.ca += parseFloat(o.total_ttc || 0);
            cm.orders++;
            if (paidChannels.indexOf(o.channel) !== -1) {
                cm.adsCA += parseFloat(o.total_ttc || 0);
            }
        });

        // 5. Totals
        var totalCA = 0, totalSpend = 0, totalAdsCA = 0, totalOrders = 0;
        clients.forEach(function(c) {
            var cm = clientMap[c.id];
            totalCA += cm.ca;
            totalSpend += cm.spend;
            totalAdsCA += cm.adsCA;
            totalOrders += cm.orders;
        });

        var totalROAS = totalSpend > 0 ? totalAdsCA / totalSpend : 0;
        var totalAOV = totalOrders > 0 ? totalCA / totalOrders : 0;

        // Update KPIs
        document.getElementById('stat-ca').textContent = fmtM(totalCA);
        document.getElementById('stat-spend').textContent = totalSpend > 0 ? fmtM(totalSpend) : '-';
        document.getElementById('stat-roas').textContent = totalSpend > 0 ? totalROAS.toFixed(2) + 'x' : '-';
        document.getElementById('stat-orders').textContent = totalOrders;
        document.getElementById('stat-aov').textContent = fmtM(totalAOV);

        // 6. Build client table
        var sorted = clients.map(function(c) {
            var cm = clientMap[c.id];
            cm.roas = cm.spend > 0 ? cm.adsCA / cm.spend : 0;
            cm.cpa = cm.orders > 0 && cm.spend > 0 ? cm.spend / cm.orders : 0;
            cm.aov = cm.orders > 0 ? cm.ca / cm.orders : 0;
            cm.id = c.id;
            return cm;
        }).sort(function(a, b) { return b.ca - a.ca; });

        var html = '<div class="table-wrap"><table><thead><tr>';
        html += '<th style="text-align:left;">Client</th><th class="text-right">CA</th><th class="text-right">Commandes</th><th class="text-right">Spend</th><th class="text-right">ROAS</th><th class="text-right">CPA</th><th class="text-right">AOV</th>';
        html += '</tr></thead><tbody>';

        sorted.forEach(function(cm) {
            var roasClass = cm.roas >= 5 ? 'roas--good' : cm.roas >= 2 ? 'roas--ok' : cm.roas > 0 ? 'roas--bad' : '';
            var roasHtml = cm.spend > 0 ? '<span class="roas-badge ' + roasClass + '">' + cm.roas.toFixed(2) + '</span>' : '-';
            html += '<tr>';
            html += '<td><a href="clients.html" class="client-link">' + cm.name + '</a></td>';
            html += '<td class="text-right text-bold">' + fmtM(cm.ca) + '</td>';
            html += '<td class="text-right">' + cm.orders + '</td>';
            html += '<td class="text-right">' + (cm.spend > 0 ? fmtM(cm.spend) : '-') + '</td>';
            html += '<td class="text-right">' + roasHtml + '</td>';
            html += '<td class="text-right">' + (cm.cpa > 0 ? fmtM(cm.cpa) : '-') + '</td>';
            html += '<td class="text-right">' + (cm.aov > 0 ? fmtM(cm.aov) : '-') + '</td>';
            html += '</tr>';
        });

        // Total row
        var tRoasClass = totalROAS >= 5 ? 'roas--good' : totalROAS >= 2 ? 'roas--ok' : totalROAS > 0 ? 'roas--bad' : '';
        html += '<tr style="font-weight:800; background:var(--hover-bg); border-top:2px solid var(--table-header-border);">';
        html += '<td>Total (' + clients.length + ' clients)</td>';
        html += '<td class="text-right">' + fmtM(totalCA) + '</td>';
        html += '<td class="text-right">' + totalOrders + '</td>';
        html += '<td class="text-right">' + (totalSpend > 0 ? fmtM(totalSpend) : '-') + '</td>';
        html += '<td class="text-right">' + (totalSpend > 0 ? '<span class="roas-badge ' + tRoasClass + '">' + totalROAS.toFixed(2) + '</span>' : '-') + '</td>';
        html += '<td class="text-right">' + (totalOrders > 0 && totalSpend > 0 ? fmtM(totalSpend / totalOrders) : '-') + '</td>';
        html += '<td class="text-right">' + fmtM(totalAOV) + '</td>';
        html += '</tr>';

        html += '</tbody></table></div>';
        document.getElementById('client-table').innerHTML = html;

        // 7. Evolution chart
        loadEvolution(clients, spendByClient);
    }

    async function loadEvolution(clients, spendByClientCurrent) {
        var container = document.getElementById('evolution-chart');
        var now = new Date();
        var startYear = now.getFullYear() - 1;
        var months = [];
        var d = new Date(startYear, 0, 1);
        while (d <= now) {
            months.push({
                label: MONTH_NAMES[d.getMonth()].substring(0, 3) + (d.getMonth() === 0 && months.length > 0 ? ' ' + d.getFullYear() : ''),
                from: fmt(new Date(d.getFullYear(), d.getMonth(), 1)),
                to: fmt(new Date(d.getFullYear(), d.getMonth() + 1, 0))
            });
            d.setMonth(d.getMonth() + 1);
        }

        var yearFrom = months[0].from;
        var yearTo = months[months.length - 1].to;

        // Fetch all orders (paginated)
        var clientIds = clients.map(function(c) { return c.id; });
        var allOrders = [], offset = 0, hasMore = true;
        while (hasMore) {
            var oRes = await sb.from('orders').select('client_id, channel, total_ttc, order_date')
                .in('client_id', clientIds)
                .gte('order_date', yearFrom)
                .lte('order_date', yearTo)
                .range(offset, offset + 999);
            var batch = oRes.data || [];
            allOrders = allOrders.concat(batch);
            hasMore = batch.length === 1000;
            offset += 1000;
        }

        // Fetch all spend
        var spendByMonth = {};
        for (var c = 0; c < clients.length; c++) {
            try {
                var aRes = await sb.from('ad_accounts').select('id').eq('client_id', clients[c].id);
                var accounts = aRes.data || [];
                if (accounts.length > 0) {
                    var accIds = accounts.map(function(a) { return a.id; });
                    var cpRes = await sb.from('ad_campaigns').select('id').in('ad_account_id', accIds);
                    var camps = cpRes.data || [];
                    if (camps.length > 0) {
                        var campIds = camps.map(function(cp) { return cp.id; });
                        var mRes = await sb.from('ad_daily_metrics').select('date, spend')
                            .in('campaign_id', campIds)
                            .gte('date', yearFrom)
                            .lte('date', yearTo);
                        (mRes.data || []).forEach(function(m) {
                            var key = m.date.substring(0, 7);
                            spendByMonth[key] = (spendByMonth[key] || 0) + parseFloat(m.spend || 0);
                        });
                    }
                }
            } catch(e) {}
        }

        var paidChannels = ['google_ads', 'meta_ads', 'tiktok_ads'];
        var data = months.map(function(m) {
            var key = m.from.substring(0, 7);
            var mOrders = allOrders.filter(function(o) { return o.order_date >= m.from && o.order_date <= m.to; });
            var ca = mOrders.reduce(function(s, o) { return s + parseFloat(o.total_ttc || 0); }, 0);
            var adsCA = mOrders.filter(function(o) { return paidChannels.indexOf(o.channel) !== -1; })
                .reduce(function(s, o) { return s + parseFloat(o.total_ttc || 0); }, 0);
            var spend = spendByMonth[key] || 0;
            return { label: m.label, ca: ca, spend: spend, roas: spend > 0 ? adsCA / spend : 0 };
        });

        var maxCA = Math.max.apply(null, data.map(function(d) { return d.ca; })) || 1;
        var maxSpend = Math.max.apply(null, data.map(function(d) { return d.spend; })) || 1;
        var maxROAS = Math.max.apply(null, data.map(function(d) { return d.roas; })) || 1;

        var html = '<div class="evo-chart">';
        html += '<div class="evo-legend">';
        html += '<div class="evo-legend__item"><div class="evo-legend__dot evo-legend__dot--ca"></div> CA Total</div>';
        html += '<div class="evo-legend__item"><div class="evo-legend__dot evo-legend__dot--spend"></div> Depenses Ads</div>';
        html += '<div class="evo-legend__item"><div class="evo-legend__dot evo-legend__dot--roas"></div> ROAS Ads</div>';
        html += '</div>';

        // CA
        html += '<div class="evo-chart__row"><div class="evo-chart__label">Chiffre d\'affaires</div><div class="evo-chart__bars">';
        data.forEach(function(d) {
            var h = maxCA > 0 ? Math.max(2, (d.ca / maxCA) * 120) : 2;
            html += '<div class="evo-bar"><div class="evo-bar__value">' + (d.ca > 0 ? fmtC(d.ca) : '') + '</div><div class="evo-bar__fill evo-bar__fill--ca" style="height:' + h + 'px;"></div><div class="evo-bar__month">' + d.label + '</div></div>';
        });
        html += '</div></div>';

        // Spend
        html += '<div class="evo-chart__row"><div class="evo-chart__label">Depenses Ads</div><div class="evo-chart__bars">';
        data.forEach(function(d) {
            var h = maxSpend > 0 ? Math.max(2, (d.spend / maxSpend) * 120) : 2;
            html += '<div class="evo-bar"><div class="evo-bar__value">' + (d.spend > 0 ? fmtC(d.spend) : '') + '</div><div class="evo-bar__fill evo-bar__fill--spend" style="height:' + h + 'px;"></div><div class="evo-bar__month">' + d.label + '</div></div>';
        });
        html += '</div></div>';

        // ROAS
        html += '<div class="evo-chart__row"><div class="evo-chart__label">ROAS Ads</div><div class="evo-chart__bars">';
        data.forEach(function(d) {
            var h = maxROAS > 0 ? Math.max(2, (d.roas / maxROAS) * 120) : 2;
            html += '<div class="evo-bar"><div class="evo-bar__value">' + (d.roas > 0 ? d.roas.toFixed(1) + 'x' : '') + '</div><div class="evo-bar__fill evo-bar__fill--roas" style="height:' + h + 'px;"></div><div class="evo-bar__month">' + d.label + '</div></div>';
        });
        html += '</div></div>';

        html += '</div>';
        container.innerHTML = html;
    }

})();
</script>
