<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Vue globale Clients - Regen Agency</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            font-family: var(--font-primary);
            background: var(--color-light);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .page-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .page-header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .page-logo {
            width: 40px;
            height: 40px;
        }

        .page-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .page-title {
            font-size: 1.4rem;
            color: var(--color-primary);
        }

        .page-header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-back, .btn-logout {
            padding: 8px 18px;
            border-radius: var(--radius-full);
            font-family: var(--font-primary);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-back {
            background: transparent;
            color: var(--color-primary);
            border: 2px solid var(--color-primary);
        }

        .btn-back:hover {
            background: var(--color-primary);
            color: white;
        }

        .btn-logout {
            background: transparent;
            color: #999;
            border: 2px solid #ddd;
        }

        .btn-logout:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        .btn-back svg, .btn-logout svg {
            width: 16px;
            height: 16px;
        }

        .placeholder-box {
            background: white;
            border-radius: var(--radius-xl);
            padding: 60px 30px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .placeholder-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            color: var(--color-secondary);
        }

        .placeholder-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--color-secondary), var(--color-accent));
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 6px 18px;
            border-radius: var(--radius-full);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .placeholder-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 10px;
        }

        .placeholder-desc {
            color: #888;
            font-size: 0.9rem;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .page-footer {
            text-align: center;
            padding-top: 40px;
            color: #999;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            .page-header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
            .page-header-left { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="page-container">

        <header class="page-header">
            <div class="page-header-left">
                <div class="page-logo">
                    <img src="../assets/images/logo-icon.png" alt="Regen Agency">
                </div>
                <h1 class="page-title">Vue globale Clients</h1>
            </div>
            <div class="page-header-actions">
                <a href="../connexion.html" class="btn-back">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    Retour
                </a>
                <button class="btn-logout" id="logoutBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Déconnexion
                </button>
            </div>
        </header>

        <div class="placeholder-box">
            <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <div class="placeholder-badge">En cours de développement</div>
            <p class="placeholder-title">Vue globale des espaces clients</p>
            <p class="placeholder-desc">
                Vous pourrez bientôt gérer tous vos clients depuis cette interface :
                suivi des performances, documents partagés et résultats Ads.
            </p>
        </div>

        <footer class="page-footer">
            <p>Regen Agency &copy; 2025 - Espace réservé</p>
        </footer>

    </div>

    <script>
    (function() {
        if (sessionStorage.getItem('regen_admin_auth') !== 'true') {
            window.location.href = '../connexion.html';
            return;
        }

        document.getElementById('logoutBtn').addEventListener('click', function() {
            sessionStorage.removeItem('regen_admin_auth');
            window.location.href = '../connexion.html';
        });
    })();
    </script>

</body>
</html>
