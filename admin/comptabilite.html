<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion comptable - Regen Agency</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--color-light);
            color: var(--color-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            padding: 2rem 1.5rem 3rem;
        }

        /* ── Header ── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .page-header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .page-header-left img {
            height: 40px;
            width: auto;
        }

        .page-header-left h1 {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        .page-header-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-header {
            font-family: 'Quicksand', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.5rem 1.1rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-retour {
            background: #e8ede9;
            color: var(--color-primary);
        }

        .btn-retour:hover {
            background: #dbe3dc;
        }

        .btn-deconnexion {
            background: var(--color-primary);
            color: #fff;
        }

        .btn-deconnexion:hover {
            opacity: 0.9;
        }

        /* ── Section titles ── */
        .section-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Quicksand', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 1rem;
        }

        .section-title svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        section {
            margin-bottom: 2.5rem;
        }

        /* ── Cards grid ── */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.85rem;
        }

        .card-link {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            background: #fff;
            border: 2px solid #e8ede9;
            border-radius: 12px;
            padding: 1rem 1.1rem;
            text-decoration: none;
            color: var(--color-dark);
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            font-size: 0.92rem;
            transition: all 0.2s ease;
        }

        .card-link:hover {
            border-color: #2FB963;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(47, 185, 99, 0.12);
        }

        .card-link svg {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            color: #2FB963;
        }

        /* ── Tags / badges ── */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .tag-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: #f0f7f2;
            color: var(--color-primary);
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.45rem 0.9rem;
            border-radius: 50px;
        }

        .tag-badge svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
            color: #2FB963;
        }

        /* ── Footer ── */
        .page-footer {
            text-align: center;
            padding: 2rem 0 1rem;
            font-size: 0.8rem;
            color: #999;
            font-family: 'Quicksand', sans-serif;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .page-header-left h1 {
                font-size: 1.25rem;
            }

            .cards-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Header -->
        <header class="page-header">
            <div class="page-header-left">
                <img src="../assets/images/logo-icon.png" alt="Regen Agency">
                <h1>Gestion comptable</h1>
            </div>
            <div class="page-header-actions">
                <a href="../connexion.html" class="btn-header btn-retour">Retour</a>
                <button class="btn-header btn-deconnexion" id="btn-logout">Déconnexion</button>
            </div>
        </header>

        <!-- 1. Dépôt de documents -->
        <section>
            <h2 class="section-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                Dépôt de documents
            </h2>
            <div class="cards-grid">
                <a href="https://app.rydge.fr/login" target="_blank" rel="noopener noreferrer" class="card-link">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                    RYDGE
                </a>
            </div>
        </section>

        <!-- 2. Abonnements — récupération de factures -->
        <section>
            <h2 class="section-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                Abonnements — récupération de factures
            </h2>
            <div class="cards-grid">
                <!-- Artlist -->
                <a href="https://artlist.io/account/invoices" target="_blank" rel="noopener noreferrer" class="card-link">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
                    Artlist
                </a>
                <!-- Quicktalk -->
                <a href="https://app.quicktalk.com/billing" target="_blank" rel="noopener noreferrer" class="card-link">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    Quicktalk
                </a>
                <!-- Adobe -->
                <a href="https://account.adobe.com/" target="_blank" rel="noopener noreferrer" class="card-link">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 22 22 22"/></svg>
                    Adobe
                </a>
                <!-- ChatGPT -->
                <a href="https://chatgpt.com/#settings/Account" target="_blank" rel="noopener noreferrer" class="card-link">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    ChatGPT
                </a>
                <!-- OVH -->
                <a href="https://manager.eu.ovhcloud.com/#/billing/history" target="_blank" rel="noopener noreferrer" class="card-link">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
                    OVH
                </a>
            </div>
        </section>

        <!-- 3. Factures reçues par email -->
        <section>
            <h2 class="section-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                Factures reçues par email
            </h2>
            <div class="tags-container">
                <span class="tag-badge">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    Legalplace
                </span>
                <span class="tag-badge">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    Google Play
                </span>
                <span class="tag-badge">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    Anthropic
                </span>
                <span class="tag-badge">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    IONOS
                </span>
            </div>
        </section>

        <!-- Footer -->
        <footer class="page-footer">
            Regen Agency &copy; 2025 - Espace réservé
        </footer>

    </div>

    <script>
        // Auth check
        if (sessionStorage.getItem('regen_admin_auth') !== 'true') {
            window.location.href = '../connexion.html';
        }

        // Déconnexion
        document.getElementById('btn-logout').addEventListener('click', function () {
            sessionStorage.removeItem('regen_admin_auth');
            window.location.href = '../connexion.html';
        });
    </script>
</body>
</html>
