<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Documents internes - Regen Agency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-primary);
            background: var(--color-light);
            min-height: 100vh;
            color: var(--color-primary);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 24px 60px;
        }

        /* ── HEADER ── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 48px;
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-logo {
            width: 52px;
            height: 52px;
            object-fit: contain;
        }

        .header-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            font-family: var(--font-primary);
            font-weight: 600;
            font-size: 0.85rem;
            padding: 10px 22px;
            border-radius: var(--radius-full);
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            color: var(--color-primary);
            border: 2px solid var(--color-primary);
        }

        .btn-danger {
            background: var(--color-primary);
            color: #fff;
        }

        /* ── CARDS GRID ── */
        .docs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 28px;
        }

        .doc-card {
            border-radius: var(--radius-lg);
            padding: 3px;
            background: var(--gradient-logo);
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            display: block;
        }

        .doc-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 28px rgba(23, 60, 58, 0.18);
        }

        .doc-card-inner {
            background: #fff;
            border-radius: calc(var(--radius-lg) - 2px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Iframe preview */
        .doc-preview {
            position: relative;
            width: 100%;
            height: 140px;
            overflow: hidden;
            background: #f0f4f2;
        }

        .doc-preview iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 500%;
            height: 500%;
            transform: scale(0.2);
            transform-origin: top left;
            border: none;
            pointer-events: none;
        }

        /* Card footer */
        .doc-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: var(--color-primary);
            color: #fff;
        }

        .doc-footer-title {
            font-weight: 600;
            font-size: 0.88rem;
            line-height: 1.3;
        }

        .doc-footer-arrow {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            background: var(--color-secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .doc-card:hover .doc-footer-arrow {
            background: var(--color-accent);
        }

        .doc-footer-arrow svg {
            width: 14px;
            height: 14px;
            fill: #fff;
        }

        /* ── FOOTER ── */
        .page-footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 24px;
            border-top: 1px solid rgba(23, 60, 58, 0.1);
            font-size: 0.82rem;
            color: rgba(23, 60, 58, 0.5);
            font-weight: 500;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .docs-grid {
                grid-template-columns: 1fr;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-title {
                font-size: 1.3rem;
            }

            .container {
                padding: 24px 16px 40px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Header -->
        <header class="page-header">
            <div class="header-left">
                <img src="../assets/images/logo-icon.png" alt="Regen Agency" class="header-logo">
                <h1 class="header-title">Documents internes</h1>
            </div>
            <div class="header-actions">
                <a href="../connexion.html" class="btn btn-outline">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 5l-7 7 7 7"/></svg>
                    Retour
                </a>
                <button id="btn-logout" class="btn btn-danger">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Déconnexion
                </button>
            </div>
        </header>

        <!-- Documents Grid -->
        <section class="docs-grid">

            <!-- Card 1 -->
            <a href="docs/ARCHITECTURE-INFRASTRUCTURE-AGENCE.html" target="_blank" class="doc-card">
                <div class="doc-card-inner">
                    <div class="doc-preview">
                        <iframe src="docs/ARCHITECTURE-INFRASTRUCTURE-AGENCE.html" loading="lazy" tabindex="-1" title="Aperçu Architecture Infrastructure"></iframe>
                    </div>
                    <div class="doc-footer">
                        <span class="doc-footer-title">Architecture Infrastructure</span>
                        <span class="doc-footer-arrow">
                            <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </span>
                    </div>
                </div>
            </a>

            <!-- Card 2 -->
            <a href="docs/CONVENTIONS-DEV-WEB.html" target="_blank" class="doc-card">
                <div class="doc-card-inner">
                    <div class="doc-preview">
                        <iframe src="docs/CONVENTIONS-DEV-WEB.html" loading="lazy" tabindex="-1" title="Aperçu Conventions Dev Web"></iframe>
                    </div>
                    <div class="doc-footer">
                        <span class="doc-footer-title">Conventions Dev Web</span>
                        <span class="doc-footer-arrow">
                            <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </span>
                    </div>
                </div>
            </a>

        </section>

        <!-- Footer -->
        <footer class="page-footer">
            Regen Agency &copy; 2025 - Espace réservé
        </footer>

    </div>

    <script>
        // Auth guard
        if (sessionStorage.getItem('regen_admin_auth') !== 'true') {
            window.location.href = '../connexion.html';
        }

        // Logout
        document.getElementById('btn-logout').addEventListener('click', function () {
            sessionStorage.clear();
            window.location.href = '../connexion.html';
        });
    </script>

</body>
</html>
