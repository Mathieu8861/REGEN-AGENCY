<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposition Commerciale — Regen Agency</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --g:#2FB963; --gd:#173C3A; --gb:#EAF8F1; --gm:#B2E8CE;
  --g2:#05C08A;
  --r:#E8290B; --rd:#B5200A; --rb:#FEF0EE; --rm:#FDDDD8;
  --dk:#202020; --d2:#2D3E52; --d3:#3D5068;
  --gr:#5A6A7E; --bd:#DDE5F0; --bg:#F4F7FB; --wh:#FFFFFF;
  --gold:#C8991A; --goldb:#FDF8E8; --goldm:#F0D870;
  --sl:#EFF3FA;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Quicksand',sans-serif;background:var(--bg);color:var(--dk);font-size:14.5px;line-height:1.6;font-weight:400}

/* ── CONTAINER ── */
.wrap{max-width:820px;margin:0 auto;padding:0 24px}

/* ── HERO COVER ── */
.cover{background:linear-gradient(135deg,#EEF3FA 0%,#E4EDF8 100%);padding:80px 0 60px;text-align:center;position:relative;overflow:hidden;border-bottom:3px solid var(--bd)}
.cover::after{content:'';position:absolute;left:0;bottom:0;width:100%;height:3px;background:linear-gradient(90deg,var(--g) 0%,var(--gd) 100%)}
.cover-logo{font-family:'Quicksand',sans-serif;font-weight:700;font-size:15px;color:var(--gd);letter-spacing:.06em;margin-bottom:6px}
.cover-logo img{height:48px;width:auto;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto}
.cover-tag{display:inline-flex;align-items:center;gap:8px;font-family:'Quicksand',sans-serif;font-size:10px;color:var(--gd);border:1px solid var(--gm);background:var(--gb);padding:3px 12px;border-radius:999px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:28px}
.cover h1{font-family:'Quicksand',sans-serif;font-weight:700;font-size:45px;color:var(--dk);line-height:1.06;margin-bottom:10px;letter-spacing:-.01em}
.cover h1 em{color:var(--g);font-style:italic}
.cover-sub{font-size:16px;color:var(--gr);font-weight:300;margin-bottom:14px}
.cover-client{font-size:14px;color:var(--gd);font-weight:600}
.cover-date{font-size:13px;color:var(--gr);margin-top:20px}
.cover-conf{font-size:11px;color:#a0b0c4;margin-top:6px;letter-spacing:.06em;text-transform:uppercase}

/* ── SECTIONS ── */
.cnt{padding:48px 0 80px}
.sec{margin-bottom:60px}
.sh{display:flex;align-items:center;gap:10px;margin-bottom:22px;padding-bottom:12px;border-bottom:2px solid var(--bd)}
.snum{font-family:'Quicksand',sans-serif;font-size:13px;font-weight:700;color:#fff;background:var(--gd);padding:5px 10px;border-radius:6px}
h2.st{font-family:'Quicksand',sans-serif;font-weight:700;font-size:26px;color:var(--gd);letter-spacing:-.01em}
h3.su{font-size:14px;font-weight:700;color:var(--d2);margin:24px 0 10px;padding-left:10px;border-left:3px solid var(--g)}
p{color:var(--gr);margin-bottom:10px;font-size:14px}
strong{color:var(--d2)}
code{font-family:'Quicksand',sans-serif;font-size:12px;background:var(--gb);color:var(--gd);padding:1px 5px;border-radius:3px}

/* ── BULLET LIST ── */
.bul{list-style:none;margin-bottom:16px}
.bul li{padding:4px 0 4px 22px;position:relative;color:var(--gr);font-size:14px}
.bul li::before{content:'✓';position:absolute;left:0;color:var(--g);font-weight:700}

/* ── ALERTS ── */
.al{border-radius:7px;padding:11px 15px;margin-bottom:16px;font-size:13.5px;display:flex;gap:9px;align-items:flex-start}
.al-i{font-size:14px;flex-shrink:0;margin-top:1px}
.alg{background:var(--gb);border:1px solid var(--gm);border-left:4px solid var(--g);color:var(--gd)}
.alw{background:#FFF9EC;border:1px solid #FDE68A;border-left:4px solid #F59E0B;color:#78350F}
.alr{background:var(--rb);border:1px solid var(--rm);border-left:4px solid var(--r);color:var(--rd)}

/* ── TABLES ── */
.tw{overflow-x:auto;margin-bottom:20px;border-radius:8px;border:1px solid var(--bd);box-shadow:0 1px 4px rgba(0,0,0,.04)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.thd th{background:var(--d2);color:rgba(255,255,255,.6)}
.thg th{background:var(--g);color:#fff}
tbody tr:hover{background:#EEF6FF}
tbody tr:nth-child(even){background:#F8FAFB}
td{padding:8px 12px;border-bottom:1px solid var(--bd);color:var(--gr);vertical-align:top;font-size:13px}
td.ts{font-weight:600;color:var(--d2);font-size:13.5px;white-space:nowrap}
td.tm{font-family:'Quicksand',sans-serif;font-size:13px}

/* ── PRICING CARDS ── */
.pricing{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px}
.pcard{border-radius:12px;overflow:hidden;border:2px solid var(--bd);background:#fff;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s}
.pcard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.pcard-reco{border-color:var(--g);box-shadow:0 4px 20px rgba(45,181,116,.15)}
.pcard-head{padding:24px 20px 20px;text-align:center}
.pcard-std .pcard-head{background:var(--sl)}
.pcard-mid .pcard-head{background:var(--gb)}
.pcard-reco .pcard-head{background:linear-gradient(135deg,var(--gd) 0%,#1E5A4A 100%)}
.pcard-badge{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;display:inline-block;padding:3px 10px;border-radius:999px}
.pcard-std .pcard-badge{background:var(--bd);color:var(--gr)}
.pcard-mid .pcard-badge{background:var(--gm);color:var(--gd)}
.pcard-reco .pcard-badge{background:rgba(255,255,255,.2);color:#fff}
.pcard-price{font-family:'Quicksand',sans-serif;font-weight:700;font-size:43px;line-height:1;margin-bottom:4px;color:var(--dk)}
.pcard-reco .pcard-price{color:#fff}
.pcard-period{font-size:13px;color:var(--gr);margin-bottom:6px}
.pcard-reco .pcard-period{color:rgba(255,255,255,.7)}
.pcard-note{font-size:12px;color:var(--gr);padding:0 8px}
.pcard-reco .pcard-note{color:rgba(255,255,255,.6)}
.pcard-highlight{margin-top:12px}
.pcard-highlight-red{font-size:12px;color:var(--rd);font-weight:600}
.pcard-highlight-green{font-size:12.5px;color:var(--gd);font-weight:700;background:var(--gb);border:1px solid var(--gm);border-radius:6px;padding:6px 10px;display:inline-block}
.pcard-reco .pcard-highlight-green{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);color:#fff}
.pcard-body{padding:18px 20px;flex:1}
.pcard-item{display:flex;gap:8px;font-size:13px;color:var(--gr);margin-bottom:8px;line-height:1.4}
.pcard-item::before{content:'✓';color:var(--g);font-weight:700;flex-shrink:0}

/* ── DEVIS ── */
.devis{background:#fff;border:2px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.devis-head{padding:20px 24px;border-bottom:2px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--sl)}
.devis-title{font-family:'Quicksand',sans-serif;font-weight:700;font-size:20px;color:var(--dk)}
.devis-num{font-family:'Quicksand',sans-serif;font-size:11px;color:var(--gr);margin-top:3px}
.devis-body{padding:20px 24px}
.devis-head-cols{display:grid;grid-template-columns:1fr 80px;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd);margin-bottom:4px}
.dhc{font-size:10px;color:var(--gr);letter-spacing:.1em;text-transform:uppercase}
.dhc:not(:first-child){text-align:right}
.devis-line{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--bd)}
.devis-line:last-child{border-bottom:none}
.dl-name{font-size:13.5px;color:var(--d2);flex:1}
.dl-name strong{color:var(--dk)}
.dl-sub{font-size:12px;color:var(--gr);display:block;margin-top:2px}
.dl-total{font-family:'Quicksand',sans-serif;font-size:13px;color:var(--dk);min-width:80px;text-align:right;font-weight:600}
.dl-total-free{color:var(--gd)}
.devis-total{background:var(--sl);border-top:2px solid var(--bd);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.devis-total-label{font-size:12px;color:var(--gr);letter-spacing:.1em;text-transform:uppercase}
.devis-total-val{font-family:'Quicksand',sans-serif;font-weight:700;font-size:32px;color:var(--gd)}

/* ── COMPARISON ── */
.compare-box{background:#fff;border:2px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:20px;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.compare-title{padding:14px 20px;background:var(--sl);border-bottom:2px solid var(--bd);font-family:'Quicksand',sans-serif;font-weight:700;font-size:16px;color:var(--dk)}
.compare-box table{font-size:13.5px}
.compare-box td,.compare-box th{padding:10px 16px}
.compare-box thead th{background:var(--d2);color:rgba(255,255,255,.7);font-size:10.5px}
.compare-box .winner{background:var(--gb);font-weight:700;color:var(--gd)}
.compare-box .loser{color:var(--gr)}

/* ── FOOTER ── */
.ft{background:var(--sl);border-top:2px solid var(--bd);padding:18px 0;text-align:center}
.ftl{font-size:12.5px;color:var(--gr)}
.ftl strong{color:var(--gd)}
.ftr{font-family:'Quicksand',sans-serif;font-size:11px;color:#a0b0c4;margin-top:4px}

/* ── REVEAL ── */
.rv{opacity:0;transform:translateY(10px);transition:.32s}
.rved{opacity:1;transform:none}

/* ── LOADING ── */
.loading-page{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px}
.loading-page .spinner{width:40px;height:40px;border:4px solid var(--bd);border-top-color:var(--g);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ── */
@media(max-width:840px){
  .pricing{grid-template-columns:1fr}
  .pcard-price{font-size:34px}
  .cover h1{font-size:30px}
}
@media print{
  .rv{opacity:1;transform:none}
  .pcard:hover{transform:none;box-shadow:none}
  body{background:#fff}
  .no-print{display:none!important}
}
</style>
</head>
<body>

<!-- Loading state -->
<div class="loading-page" id="loadingState">
    <div class="spinner"></div>
    <p style="color:var(--gr);font-size:13px;">Chargement de la proposition...</p>
</div>

<!-- Error state -->
<div class="loading-page" id="errorState" style="display:none">
    <p style="color:var(--rd);font-size:14px;font-weight:600;">Proposition introuvable ou lien invalide.</p>
</div>

<!-- Proposal content (injected dynamically) -->
<div id="proposalContent" style="display:none"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    var SUPABASE_URL = 'https://jrhqqsybebdkoqrnogez.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpyaHFxc3liZWJka29xcm5vZ2V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDU2NzEsImV4cCI6MjA4ODEyMTY3MX0._BykT5zc-GH6SLwi_jaaukNmmmR_zpcdsuic3E5dFm8';
    var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    var params = new URLSearchParams(window.location.search);
    var prospectId = params.get('id');

    if (!prospectId) {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('errorState').style.display = 'flex';
        return;
    }

    async function load() {
        // Fetch the latest proposal from activities
        var res = await sb.from('prospect_activities')
            .select('content, created_at')
            .eq('prospect_id', prospectId)
            .eq('activity_type', 'proposal_html')
            .order('created_at', { ascending: false })
            .limit(1)
            .single();

        if (res.error || !res.data || !res.data.content) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'flex';
            return;
        }

        // Inject HTML
        document.getElementById('loadingState').style.display = 'none';
        var container = document.getElementById('proposalContent');
        container.innerHTML = res.data.content;
        container.style.display = 'block';

        // Update title
        var h1 = container.querySelector('.cover h1');
        if (h1) document.title = 'Proposition — ' + h1.textContent.replace(/<[^>]+>/g, '') + ' — Regen Agency';

        // Reveal animation
        var obs = new IntersectionObserver(function(entries) {
            entries.forEach(function(el) { if (el.isIntersecting) el.target.classList.add('rved'); });
        }, { threshold: 0.04 });
        document.querySelectorAll('.rv').forEach(function(el) { obs.observe(el); });
    }

    load();
})();
</script>
</body>
</html>
